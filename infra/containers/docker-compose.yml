name: filmoteca

services:
  database:
    image: filmoteca-database:latest
    build:
      context: ../..
      dockerfile: infra/containers/web/database/Dockerfile
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/filmoteca.db
      QUERIES_PATH: /app/web/database/queries
    volumes:
      - ../../data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/database/health"]
      interval: 20s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  auth:
    image: filmoteca-auth:latest
    build:
      context: ../..
      dockerfile: infra/containers/web/auth/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: http://database:3003
    volumes:
      - ../../data:/app/data
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/auth/health"]
      interval: 20s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  i18n:
    image: filmoteca-i18n:latest
    build:
      context: ../..
      dockerfile: infra/containers/web/i18n/Dockerfile
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/i18n/health"]
      interval: 20s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  gateway:
    image: filmoteca-gateway:latest
    build:
      context: ../..
      dockerfile: infra/containers/web/gateway/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: http://database:3003
      AUTH_URL: http://auth:3001
      I18N_URL: http://i18n:3002
    volumes:
      - ../../data:/app/data:ro
    depends_on:
      database:
        condition: service_healthy
      auth:
        condition: service_healthy
      i18n:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/gateway/health"]
      interval: 20s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  nginx:
    image: filmoteca-nginx:latest
    build:
      context: ../..
      dockerfile: infra/containers/web/nginx/Dockerfile
    ports:
      - "8443:443"
    volumes:
      - ../../data/logs/nginx:/var/log/nginx
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost/health"]
      interval: 20s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  default:
    name: filmoteca-net
