<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="title" content="Gestor de Películas">
    <meta name="description" content="Web para gestionar las películas">
    <link rel="shortcut icon" href="/assets/favicon.png">
    <title>Gestor de Películas</title>
    <link rel="stylesheet" type="text/css" href="/css/styles.css">
    <script type="module" src="/js/main.js"></script>
</head>
<body>
    <div class="main-container">
        <header>
            <nav>
                <div class="menu">
                    <i>⚙</i>
                    <div class="container-left" id="nav-menu">
                    </div>
                </div>
                <form id="form-search" action="/view" method="GET">
					<input type="search" name="search" id="text-search" list="dlSearch" placeholder="Título o año" data-action="autocomplete-search">
                    <datalist id="dlSearch"></datalist>
                    <i class="btn" id="clear-search" data-action="clear-search">x</i>
                    <input type="submit" id="btn-search" class="btn btn-light" value="🔍">
                </form>
                <div class="menu">
                    <i>𝄙</i>
                    <div class="container-right" id="genre-menu">
                    </div>
                </div>
            </nav>
        </header>
        <section class="container">
            <div id="main-content"></div>
            <div id="alerts-container"></div>
        </section>
        <div id="loading" style="display: none;">
            <div class="progress" style="height: 20px;">
                <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated"
                     role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                    <span id="progress-text">0% completado</span>
                </div>
            </div>
            <p>Cargando, por favor espere...</p>
        </div>
        <!-- Movie editor modal is now unified and managed by ModalManager.ts in modal-container -->
        <div id="screen-block" style="display: none;"></div>
        <noscript>
            <div class="noscript-warning">
                Javascript está deshabilitado en su navegador web.<br>
                Por favor, para ver correctamente este sitio, <b><i>habilite javascript</i></b>.
            </div>
        </noscript>
        <footer id="footer-bottom"></footer>
    </div>


</body>
</html>
