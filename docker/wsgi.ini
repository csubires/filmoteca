[uwsgi]
chdir = /usr/src/app/filmoteca
wsgi-file = /usr/src/app/filmoteca/server.py
callable = application
socket = 0.0.0.0:8080
processes = 1
workers = 4
threads = 2
master = true
chmod-socket = 660
vacuum = true
die-on-term = true
logto = /var/log/nginx/%n.log
uid = www-data
gid = www-data
idle = 300
max-requests = 100
limit-as = 256
buffer-size = 32768
