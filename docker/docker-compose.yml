services:
  nginx:
    image: nginx
    build: requirements/nginx
    container_name: nginx
    ports: ["443:443"]
    networks: [net]
    depends_on: [wordpress]
    volumes: [wordpress:/var/www/html]
    env_file: .env
    restart: always

  mariadb:
    image: mariadb
    build: requirements/mariadb
    container_name: mariadb
    hostname: mariadb
    networks: [net]
    volumes: [mariadb:/var/lib/mysql]
    env_file: .env
    restart: always

  wordpress:
    image: wordpress
    build: requirements/wordpress
    container_name: wordpress
    networks: [net]
    volumes: [wordpress:/var/www/html]
    env_file: [.env]
    depends_on: [mariadb]
    restart: always

networks:
  net:
    name: inception
    driver: bridge

volumes:
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${HOME}/data/mariadb

  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${HOME}/data/wordpress
